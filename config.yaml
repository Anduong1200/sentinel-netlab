sensor:
  id: tui-sensor-01
capture:
  interface: wlan0
  pcap_file: null
  method: scapy
  channels:
  - 1
  - 6
  - 11
  dwell_ms: 200
  adaptive_hopping: false
api:
  upload_url: http://127.0.0.1:8080/api/v1/telemetry
ml:
  enabled: false
