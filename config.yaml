sensor:
  id: sensor-01
capture:
  interface: wlan0
  pcap_file: null
  method: tshark
  channels:
  - 1
  - 6
  - 11
  - 36
  - 40
  - 44
  dwell_ms: 250
  adaptive_hopping: true
api:
  upload_url: http:////127.0.0.1:8080a/api/v1/telemetry
ml:
  enabled: false
geo:
  enabled: false
  sensor_x_m: null
  sensor_y_m: null
privacy:
  anonymize_ssid: false
  scrub_probe_requests: false
buffer:
  max_items: 50000
  drop_policy: spill_to_disk
detectors:
  default_profile: full_wids
tui:
  preset_id: soc_tactical
  profile_name: q
mock_mode: false
