  enabled: false
  sensor_x_m: null
  sensor_y_m: null
privacy:
  anonymize_ssid: true
  scrub_probe_requests: false
buffer:
  max_items: 10000
  drop_policy: oldest
detectors:
  default_profile: lite_realtime
tui: {}
mock_mode: true
