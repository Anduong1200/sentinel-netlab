sensor:
  id: "lab-sensor-01"

capture:
  interface: "wlan0mon"
  method: "scapy"
  channels: [1, 6, 11]
  dwell_ms: 250
  adaptive_hopping: false
  pcap_file: null

buffer:
  max_items: 12000
  drop_policy: "oldest"

api:
  upload_url: "http://127.0.0.1:8080/api/v1/telemetry"

upload:
  batch_size: 200
  interval_sec: 5.0

ml:
  enabled: false

geo:
  enabled: false
  sensor_x_m: null
  sensor_y_m: null

privacy:
  anonymize_ssid: true
  scrub_probe_requests: true

detectors:
  default_profile: "lite_realtime"

mock_mode: true

tui:
  profile_name: "Lab Demo"
  preset_id: ""
