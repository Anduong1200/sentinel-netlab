repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy-replay-strict
        name: mypy replay strict
        entry: mypy
        language: system
        pass_filenames: false
        args:
          [
            "--strict",
            "--follow-imports=silent",
            "sensor/capture_driver.py",
            "sensor/replay/pcap_reader.py",
            "tests/unit/test_capture_driver.py",
            "tests/integration/test_scenarios.py",
            "tests/detectors/test_pcap_regression.py",
          ]
      - id: bandit-check
        name: bandit security scan
        entry: bandit
        language: system
        pass_filenames: false
        args:
          [
            "-r",
            "sensor",
            "controller",
            "common",
            "algos",
            "-ll",
            "-x",
            "tests,notebooks,tools,examples",
          ]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package.lock.json

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
